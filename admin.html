<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard • Kunselman & Andrew</title>
  <meta name="robots" content="noindex, nofollow"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --brass: #c9a96e;
      --dark-brass: #a67c52;
      --aged-parchment: #f0e0c0;
      --charcoal: #1f1a16;
      --deep-brown: #2c2118;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--charcoal);
      color: var(--aged-parchment);
      margin: 0;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(31,26,22,0.90), rgba(44,33,24,0.85)),
                  url('https://thumbs.dreamstime.com/b/steampunk-world-map-globe-gears-light-bulbs-vintage-style-featuring-detailed-surrounded-illuminated-creating-399081511.jpg') center/cover no-repeat;
      z-index: -2;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 3rem 1rem 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .content-card {
      background: rgba(44, 33, 24, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--dark-brass);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 40px rgba(0,0,0,0.65);
      margin: 0 auto 3rem;
      max-width: 1200px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 2.5rem;
      font-weight: 600;
      font-size: 1.25rem;
      border: 2px solid var(--brass);
      border-radius: 0.75rem;
      color: var(--brass);
      background: rgba(201,169,110,0.12);
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(201,169,110,0.35);
      cursor: pointer;
      min-width: 260px;
    }

    .btn:hover {
      background: var(--brass);
      color: var(--charcoal);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(201,169,110,0.6);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 12px rgba(201,169,110,0.4);
    }

    .preview-img {
      @apply h-24 w-24 object-cover rounded-md border border-[var(--dark-brass)] m-2 shadow-md;
    }

    .image-preview {
      @apply flex flex-wrap mt-4;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      text-shadow: 0 3px 10px rgba(0,0,0,0.7);
    }

    @media (max-width: 768px) {
      .content-card {
        padding: 2rem 1.5rem;
        margin: 0 1rem 2rem;
      }
      .btn {
        padding: 1rem 2rem;
        font-size: 1.1rem;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Access Guard -->
  <script>
    if (localStorage.getItem('adminAccess') !== 'granted') {
      alert("Please log in first.");
      window.location.href = "/admin-login.html";  // ← update this if you rename login file
    }
  </script>

  <main>
    <div class="content-card">
      <div class="flex justify-between items-center mb-12 flex-wrap gap-6">
        <h1 class="text-4xl md:text-5xl text-[var(--brass)] tracking-wide">Admin Dashboard</h1>
        <div class="flex gap-6">
          <a href="/" class="btn">Back to Home</a>
          <button onclick="logout()" class="btn">Logout</button>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-10">

        <!-- Form -->
        <div>
          <h2 class="text-3xl text-[var(--brass)] mb-8">Add New Listing</h2>

          <form id="addItemForm" class="space-y-6">
            <div>
              <label class="block text-lg mb-2">Title *</label>
              <input type="text" id="title" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
            </div>

            <div>
              <label class="block text-lg mb-2">Description *</label>
              <textarea id="description" rows="5" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]"></textarea>
            </div>

            <div class="grid md:grid-cols-3 gap-6">
              <div>
                <label class="block text-lg mb-2">Price (USD) *</label>
                <input type="number" id="price" min="0" step="0.01" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
              </div>
              <div>
                <label class="block text-lg mb-2">Category *</label>
                <input type="text" id="category" placeholder="e.g. Scientific Instruments" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
              </div>
              <div>
                <label class="block text-lg mb-2">Era</label>
                <input type="text" id="era" placeholder="e.g. Victorian" class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
              </div>
            </div>

            <div>
              <label class="block text-lg mb-2">Condition</label>
              <select id="condition" class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
                <option>Excellent</option>
                <option>Very Good</option>
                <option>Good</option>
                <option>Fair</option>
                <option>Poor</option>
                <option>As Found</option>
              </select>
            </div>

            <div>
              <label class="block text-lg mb-2">Images (multiple allowed)</label>
              <input type="file" id="images" accept="image/*" multiple class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[var(--dark-brass)/0.6] file:text-[var(--aged-parchment)] hover:file:bg-[var(--brass)/0.3]">
              <div id="imagePreview" class="image-preview"></div>
            </div>

            <div class="flex gap-4 mt-8">
              <button type="submit" class="btn flex-1">Add Item</button>
              <button type="button" onclick="clearForm()" class="btn flex-1">Clear Form</button>
            </div>
          </form>
        </div>

        <!-- Preview & Actions -->
        <div>
          <h2 class="text-3xl text-[var(--brass)] mb-8">Entry Preview</h2>
          <pre id="preview" class="bg-[rgba(0,0,0,0.4)] p-6 rounded-lg text-sm overflow-auto max-h-[70vh] whitespace-pre-wrap opacity-90 font-mono"></pre>

          <div class="mt-6 flex gap-4">
            <button onclick="copyToClipboard()" class="btn w-full">Copy JSON to Clipboard</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Logout
    function logout() {
      localStorage.removeItem('adminAccess');
      window.location.href = "/";
    }

    // Clear form
    function clearForm() {
      document.getElementById('addItemForm').reset();
      document.getElementById('preview').textContent = "";
      document.getElementById('imagePreview').innerHTML = "";
    }

    // Copy to clipboard
    function copyToClipboard() {
      const text = document.getElementById('preview').textContent;
      if (!text) return alert("Nothing to copy.");
      navigator.clipboard.writeText(text).then(() => {
        alert("JSON copied to clipboard!");
      }).catch(() => {
        alert("Copy failed.");
      });
    }

    // Image preview
    const fileInput = document.getElementById('images');
    const previewDiv = document.getElementById('imagePreview');

    fileInput.addEventListener('change', function() {
      previewDiv.innerHTML = '';
      [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-img';
          previewDiv.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    // Form submit
    document.getElementById('addItemForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const files = fileInput.files;
      const imageNames = Array.from(files).map(file => file.name);

      const item = {
        id: Date.now(),
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        price: parseFloat(document.getElementById('price').value) || 0,
        currency: "USD",
        category: document.getElementById('category').value.trim(),
        era: document.getElementById('era').value.trim() || "Unknown",
        condition: document.getElementById('condition').value,
        images: imageNames,
        featuredImage: imageNames[0] ? `/images/${imageNames[0]}` : "",
        dateListed: new Date().toISOString().split('T')[0]
      };

      const jsonString = JSON.stringify(item, null, 2);
      document.getElementById('preview').textContent = jsonString;

      console.log("New item (images are filenames only):", item);
      alert(
        'Item prepared!\n\n' +
        'Next steps:\n' +
        '1. Upload selected images to /images/ via GitHub\n' +
        '2. Copy JSON below\n' +
        '3. Paste into data/listings.json array\n' +
        '4. Update "images" paths if needed\n' +
        '5. Commit/push'
      );
    });
  </script>

</body>
</html>
