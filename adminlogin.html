<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login • Kunselman & Andrew</title>
  <meta name="robots" content="noindex, nofollow"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --brass: #c9a96e;
      --dark-brass: #a67c52;
      --aged-parchment: #f0e0c0;
      --charcoal: #1f1a16;
      --deep-brown: #2c2118;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--charcoal);
      color: var(--aged-parchment);
      margin: 0;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(31,26,22,0.90), rgba(44,33,24,0.85)),
                  url('https://thumbs.dreamstime.com/b/steampunk-world-map-globe-gears-light-bulbs-vintage-style-featuring-detailed-surrounded-illuminated-creating-399081511.jpg') center/cover no-repeat;
      z-index: -2;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: rgba(44, 33, 24, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--dark-brass);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 40px rgba(0,0,0,0.65);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1.25rem;
      font-weight: 600;
      font-size: 1.25rem;
      border: 2px solid var(--brass);
      border-radius: 0.75rem;
      color: var(--brass);
      background: rgba(201,169,110,0.12);
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(201,169,110,0.35);
      cursor: pointer;
      margin-top: 1.5rem;
    }

    .btn:hover {
      background: var(--brass);
      color: var(--charcoal);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(201,169,110,0.6);
    }

    input[type="password"] {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.1rem;
      background: rgba(44,33,24,0.7);
      border: 1px solid var(--dark-brass);
      color: var(--aged-parchment);
      border-radius: 0.75rem;
      margin: 1rem 0 0.5rem;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--brass);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.25);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.75rem;
      color: var(--brass);
      margin-bottom: 1rem;
      text-shadow: 0 3px 10px rgba(0,0,0,0.7);
    }

    p {
      font-size: 1.15rem;
      line-height: 1.6;
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 2.25rem;
      }
    }
  </style>
</head>
<body>

  <main>
    <div class="login-card">
      <h1>Admin Access</h1>
      <p class="mb-8">Restricted area — enter passphrase to continue</p>

      <form id="loginForm">
        <input 
          type="password" 
          id="password" 
          placeholder="Passphrase" 
          autocomplete="off"
          required
        >
        <button type="submit" class="btn">Enter</button>
      </form>

      <p class="mt-8 text-sm opacity-70">
        Contact Dean if you cannot access
      </p>
    </div>
  </main>

  <script>
    // CHANGE THIS BEFORE UPLOADING – use a strong, unique passphrase
    const CORRECT_PASSPHRASE = "change-this-to-a-long-random-string-2026";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const input = document.getElementById('password').value.trim();
      
      if (input === CORRECT_PASSPHRASE) {
        localStorage.setItem('adminAccess', 'granted');
        window.location.href = "/admin.html";
      } else {
        alert("Incorrect passphrase.");
        document.getElementById('password').value = "";
        document.getElementById('password').focus();
      }
    });
  </script>

</body>
</html>
