<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard • Kunselman & Andrew</title>
  <meta name="robots" content="noindex, nofollow"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --brass: #c9a96e;
      --dark-brass: #a67c52;
      --aged-parchment: #f0e0c0;
      --charcoal: #1f1a16;
      --deep-brown: #2c2118;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--charcoal);
      color: var(--aged-parchment);
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }
    .hero-bg {
      background: linear-gradient(rgba(31,26,22,0.92), rgba(44,33,24,0.88)),
                  url('https://images.unsplash.com/photo-1617791160505-6f00504e3519?auto=format&fit=crop&q=80') center/cover no-repeat fixed;
      background-blend-mode: multiply;
    }
    .card {
      @apply p-8 rounded-xl border border-[var(--dark-brass)] bg-[var(--deep-brown)/0.85] backdrop-blur-md shadow-xl;
    }
    .preview-img {
      @apply h-24 w-24 object-cover rounded-md border border-[var(--dark-brass)] m-2 shadow-md;
    }
    .btn-save {
      @apply px-8 py-4 rounded-xl font-semibold text-lg tracking-wide transition-all duration-300 border-2 border-[var(--brass)] text-[var(--brass)] hover:bg-[var(--brass)] hover:text-[var(--charcoal)] shadow-[0_0_20px_rgba(201,169,110,0.5)];
    }
    .btn-logout {
      @apply px-6 py-3 rounded-lg font-medium text-base border border-[var(--dark-brass)] text-[var(--aged-parchment)] hover:bg-[var(--dark-brass)] hover:text-[var(--aged-parchment)];
    }
  </style>
</head>
<body class="min-h-screen hero-bg bg-fixed">

  <section class="max-w-5xl mx-auto py-12 px-6 md:px-10">

    <!-- Access Guard -->
    <script>
      if (localStorage.getItem('adminAccess') !== 'granted') {
        alert("Please log in first.");
        window.location.href = "/admin/login/";
      }
    </script>

    <div class="text-center mb-12">
      <h1 class="text-5xl text-[var(--brass)] mb-4">Admin Dashboard</h1>
      <p class="text-xl opacity-85">Add New Listing Item</p>
    </div>

    <div class="card mb-12">
      <form id="addItemForm" class="space-y-8">
        <div>
          <label class="block text-lg mb-2">Title</label>
          <input type="text" id="title" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
        </div>

        <div>
          <label class="block text-lg mb-2">Description</label>
          <textarea id="description" rows="5" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]"></textarea>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="block text-lg mb-2">Price (USD)</label>
            <input type="number" id="price" min="0" step="0.01" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
          </div>
          <div>
            <label class="block text-lg mb-2">Category</label>
            <input type="text" id="category" placeholder="e.g. Scientific Instruments" required class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
          </div>
          <div>
            <label class="block text-lg mb-2">Era</label>
            <input type="text" id="era" placeholder="e.g. Victorian" class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
          </div>
        </div>

        <div>
          <label class="block text-lg mb-2">Condition</label>
          <select id="condition" class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] focus:outline-none focus:border-[var(--brass)]">
            <option>Excellent</option>
            <option>Very Good</option>
            <option>Good</option>
            <option>Fair</option>
            <option>Poor</option>
          </select>
        </div>

        <div>
          <label class="block text-lg mb-2">Images (multiple allowed)</label>
          <input type="file" id="images" accept="image/*" multiple class="w-full px-5 py-3 rounded-lg bg-[rgba(44,33,24,0.7)] border border-[var(--dark-brass)] text-[var(--aged-parchment)] file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[var(--dark-brass)/0.6] file:text-[var(--aged-parchment)] hover:file:bg-[var(--brass)/0.3]">
          <div id="imagePreview" class="flex flex-wrap mt-4"></div>
        </div>

        <div class="flex justify-between items-center pt-6">
          <button type="button" id="logoutBtn" class="btn-logout">Logout</button>
          <button type="submit" class="btn-save">Save Item</button>
        </div>
      </form>
    </div>

    <!-- JSON Preview -->
    <div class="card">
      <h2 class="text-3xl text-[var(--brass)] mb-6">JSON Preview</h2>
      <pre id="jsonPreview" class="bg-[rgba(0,0,0,0.4)] p-6 rounded-lg overflow-auto max-h-96 text-sm whitespace-pre-wrap"></pre>
    </div>

  </section>

  <script>
    // Image Preview
    const fileInput = document.getElementById('images');
    const previewDiv = document.getElementById('imagePreview');

    fileInput.addEventListener('change', function() {
      previewDiv.innerHTML = '';
      [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-img';
          previewDiv.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    // Form Submit → Generate JSON Preview & Console Log
    document.getElementById('addItemForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = {
        id: Date.now(), // simple unique ID
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        price: parseFloat(document.getElementById('price').value),
        category: document.getElementById('category').value.trim(),
        era: document.getElementById('era').value.trim(),
        condition: document.getElementById('condition').value,
        images: [], // in real use: upload paths or base64 (not recommended for large files)
        dateAdded: new Date().toISOString().split('T')[0]
      };

      // For demo: collect image names only (real upload would need backend)
      [...fileInput.files].forEach(file => {
        formData.images.push(file.name); // placeholder; replace with actual paths after upload
      });

      const jsonString = JSON.stringify(formData, null, 2);
      document.getElementById('jsonPreview').textContent = jsonString;

      console.log('New item data:', formData);
      alert('Item data prepared! Check console & JSON preview. (In production: send to backend or save locally)');

      // Optional: clear form after "save"
      // this.reset();
      // previewDiv.innerHTML = '';
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('adminAccess');
      window.location.href = '/';
    });
  </script>

</body>
</html>
